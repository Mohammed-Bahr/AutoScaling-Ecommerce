apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sonarqube.fullname" . }}
  labels:
    {{- include "sonarqube.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sonarqube.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sonarqube.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-sysctl
          image: busybox:1.36
          command:
            - sysctl
            - -w
            - vm.max_map_count=524288
          securityContext:
            privileged: true
      containers:
        - name: sonarqube
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: SONAR_JDBC_USERNAME
              value: {{ .Values.postgresql.database.user | quote }}
            - name: SONAR_JDBC_PASSWORD
              value: {{ .Values.postgresql.database.password | quote }}
            - name: SONAR_JDBC_URL
              value: jdbc:postgresql://{{ include "sonarqube.fullname" . }}-postgresql:5432/{{ .Values.postgresql.database.name }}
            - name: SONAR_SEARCH_JAVAOPTS
              value: {{ .Values.sonarProperties.sonar.search.javaOpts | quote }}
            - name: SONAR_WEB_JAVAOPTS
              value: {{ .Values.sonarProperties.sonar.web.javaOpts | quote }}
            - name: SONAR_CE_JAVAOPTS
              value: {{ .Values.sonarProperties.sonar.ce.javaOpts | quote }}
          volumeMounts:
            - name: sonarqube-data
              mountPath: /opt/sonarqube/data
            - name: sonarqube-config
              mountPath: /opt/sonarqube/conf/sonar.properties
              subPath: sonar.properties
          livenessProbe:
            httpGet:
              path: /api/system/health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /api/system/health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: sonarqube-data
          persistentVolumeClaim:
            claimName: {{ include "sonarqube.fullname" . }}-data
        - name: sonarqube-config
          configMap:
            name: {{ include "sonarqube.fullname" . }}-config
