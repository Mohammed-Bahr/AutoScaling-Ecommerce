apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "sonarqube.fullname" . }}-postgresql
  labels:
    {{- include "sonarqube.labels" . | nindent 4 }}
    component: postgresql
spec:
  serviceName: {{ include "sonarqube.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "sonarqube.name" . }}-postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "sonarqube.name" . }}-postgresql
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database.name }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.database.user }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.database.password }}
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
      spec:
        accessModes: [{{ .Values.postgresql.persistence.accessMode | default "ReadWriteOnce" }}]
        {{- if .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ .Values.postgresql.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sonarqube.fullname" . }}-postgresql
  labels:
    {{- include "sonarqube.labels" . | nindent 4 }}
    component: postgresql
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "sonarqube.name" . }}-postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
