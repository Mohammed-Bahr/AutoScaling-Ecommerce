---
replicaCount: 1

image:
  repository: sonarqube
  tag: "25.4.0-community"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9000
  targetPort: 9000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: sonarqube.ecommerce.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  size: 5Gi
  accessMode: ReadWriteOnce
  storageClass: ""

resources:
  requests:
    memory: 2Gi
    cpu: 1
  limits:
    memory: 4Gi
    cpu: 2

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16"
  persistence:
    enabled: true
    size: 5Gi
  database:
    name: sonarqube
    user: sonarqube
    password: sonarqube

jvmOpts: "-Xmx2g -Xms1g"

sonarProperties:
  sonar.search.javaOpts: "-Xms512m -Xmx512m"
  sonar.web.javaOpts: "-Xms512m -Xmx512m"
  sonar.ce.javaOpts: "-Xms512m -Xmx512m"

probes:
  liveness:
    initialDelaySeconds: 120
    periodSeconds: 30
  readiness:
    initialDelaySeconds: 60
    periodSeconds: 30

nodeSelector: {}
tolerations: []
affinity: {}
