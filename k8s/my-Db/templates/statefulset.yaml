apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "database.fullname" . }}
  labels:
    {{- include "database.labels" . | nindent 4 }}
spec:
  # StatefulSets require a matching service name to track network identity
  serviceName: {{ include "database.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "database.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "database.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "database.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          volumeMounts:
            # This name must match the volumeClaimTemplate name below
            - name: {{ include "database.fullname" . }}-storage
              mountPath: /data/db
  
  # This block automatically creates a dedicated PVC for every replica
  volumeClaimTemplates:
    - metadata:
        name: {{ include "database.fullname" . }}-storage
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
