replicaCount: 1

image:
  repository: mongo
  tag: "8"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 27017

persistence:
  size: 1Gi
  accessMode: ReadWriteOnce

# CRITICAL: This forces the service name to be exactly "mongo" 
# so your backend MONGO_URI string doesn't break!
fullnameOverride: "mongo"
