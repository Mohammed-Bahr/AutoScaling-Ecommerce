apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "my-mongo.fullname" . }}-statefulset
  labels:
    {{- include "my-mongo.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "my-mongo.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "my-mongo.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "my-mongo.labels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /data/db"]
          volumeMounts:
            - name: data
              mountPath: /data/db
      containers:
        - name: {{ include "my-mongo.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: mongo
              containerPort: {{ .Values.service.port }}
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-mongo.fullname" . }}-secret
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-mongo.fullname" . }}-secret
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-mongo.fullname" . }}-secret
                  key: MONGO_INITDB_DATABASE
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-mongo.fullname" . }}-secret
                  key: MONGO_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "my-mongo.fullname" . }}-secret
                  key: MONGO_PASSWORD
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data/db
            # - name: init-scripts
            #   mountPath: /docker-entrypoint-initdb.d
      # volumes:
      #   - name: data
      #     persistentVolumeClaim:
      #       claimName: {{ include "my-mongo.fullname" . }}-pvc
      #   - name: init-scripts
      #     configMap:
      #       name: {{ include "my-mongo.fullname" . }}-init
      #       defaultMode: 0o755
      #
      volumeClaimTemplates:
        - metadata:
            name: data
          spec:
            accessModes:
              - ReadWriteOnce

            storageClassName: {{ .Values.persistence.storageClass }}

            resources:
              requests:
                storage: {{ .Values.persistence.size }}
