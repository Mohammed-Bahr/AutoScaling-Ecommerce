apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: ecom
type: Opaque
stringData:
  # Override these values per environment via overlays or sealed-secrets.
  # DO NOT commit real prod credentials to git.
  MONGO_INITDB_ROOT_USERNAME: root
  MONGO_INITDB_ROOT_PASSWORD: change-me-root
  MONGO_INITDB_DATABASE: depi-project
  MONGO_USERNAME: appuser
  MONGO_PASSWORD: change-me-app
