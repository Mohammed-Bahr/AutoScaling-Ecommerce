apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ecom
  labels:
    app: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: mern-stack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: mern-stack
    spec:
      # Wait for Mongo to be reachable before starting. This is a soft check —
      # the readiness probe below is the real gate.
      initContainers:
        - name: wait-for-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for mongodb-client:27017 ..."
              until nc -z mongodb-client 27017; do
                sleep 2
              done
              echo "Mongo is reachable."
      containers:
        - name: backend
          # ⚠️ Change this to your image (Docker Hub / GHCR / ECR).
          # If using `kind load docker-image`, the image must already be loaded
          # on every node and tagged exactly like this.
          image: mern-backend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: NODE_ENV
              value: production
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
            - name: PAYPAL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: PAYPAL_CLIENT_ID
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ecom
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
