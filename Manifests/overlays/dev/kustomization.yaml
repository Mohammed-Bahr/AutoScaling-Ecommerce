apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecom

resources:
  - ../../base

# Customize per environment here. For real prod, swap these for sealed-secrets /
# external-secrets / SOPS — never commit real passwords.
secretGenerator:
  - name: mongo-secret
    behavior: merge
    literals:
      - MONGO_INITDB_ROOT_PASSWORD=devrootpw
      - MONGO_PASSWORD=devapppw
  - name: backend-secret
    behavior: merge
    literals:
      - JWT_SECRET=dev-jwt-secret-change-me
      - MONGO_URI=mongodb://appuser:devapppw@my-mongo:27017/depi-project?authSource=depi-project

patches:
  # Scale backend/frontend down for kind (1 node, limited resources)
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
