name: "CD - Backend Docker Image "

on:
  push:
    branches: [mahmoud]
    paths:
      - "backend/**"
      - ".github/workflows/mahmoud-ImageB.yml"

jobs:
  build-and-push-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: mohammedbahr
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build backend image
        run: docker build -t mohammedbahr/depi-project-backend:latest -f backend/dockerfile .

      - name: Push backend image
        run: docker push mohammedbahr/depi-project-backend:latest