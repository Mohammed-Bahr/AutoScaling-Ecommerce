name: "Build and Push Docker Image"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-package:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      # ---------- Checkout ------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # - name: Login to Docker Hub
      #   run: docker login -u mohammedbahr -p ${{ secrets.DOCKER_TOKEN }}
      - name: Login to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: mohammedbahr
          password: ${{ secrets.DOCKER_TOKEN }}

      # ---------- Backend ------------
      - name: build backend image
        run: docker build -t mohammedbahr/depi-project-backend:latest -f backend/dockerfile .

      - name: List Docker images
        run: docker images

      - name: push backend image
        run: docker push mohammedbahr/depi-project-backend:latest

      # ---------- Frontend ------------
      - name: build frontend image
        working-directory: ./frontend
        run: docker build -t mohammedbahr/depi-project-frontend:latest -f dockerfile .

      - name: List Docker images
        run: docker images

      - name: push frontend image
        run: docker push mohammedbahr/depi-project-frontend:latest
