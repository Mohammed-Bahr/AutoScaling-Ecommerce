name: CI - Pre-Merge Security Gates

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - "frontend/**"

# Least-privilege token — only read source code
permissions:
  contents: read

# Cancel in-progress runs for the same PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}

  lint-test-build:
    name: Lint, Test, Build
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Backend
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint Backend
        working-directory: ./backend
        run: npm run lint --if-present

      - name: Test Backend
        working-directory: ./backend
        run: npm test --if-present

      - name: Build Backend
        working-directory: ./backend
        run: npm run build --if-present

      # Frontend
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint --if-present

      - name: Test Frontend
        working-directory: ./frontend
        run: npm test --if-present

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build --if-present

  deploy-sonarqube:
    name: Deploy SonarQube via Helm
    needs: lint-test-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only runs if the KUBE_CONFIG secret is set (self-hosted runner or k8s‑accessible CI)
    # If KUBE_CONFIG is not set, the existing SONAR_HOST_URL secret will be used instead.
    if: ${{ secrets.KUBE_CONFIG != '' }}
    outputs:
      sonar_host_url: ${{ steps.sonar-url.outputs.url }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Setup Helm
        uses: azure/setup-helm@fe7b79cd3ee0e78aa00b5c9ae0a0386ecc8b754e # v4.3.0
        with:
          version: v3.17.2

      - name: Deploy SonarQube
        run: |
          helm upgrade --install sonarqube-ci ./k8s/helm/sonarqube \
            --namespace sonarqube --create-namespace \
            --wait --timeout 10m

      - name: Get SonarQube Service URL
        id: sonar-url
        run: |
          echo "url=http://sonarqube-ci:9000" >> $GITHUB_OUTPUT

  sonarqube:
    name: SonarQube Analysis
    needs: [lint-test-build, deploy-sonarqube]
    if: ${{ !cancelled() && (needs.deploy-sonarqube.result == 'success' || needs.deploy-sonarqube.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v4.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ needs.deploy-sonarqube.outputs.sonar_host_url || secrets.SONAR_HOST_URL }}
