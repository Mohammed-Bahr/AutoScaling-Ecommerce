name: "CI/CD Pipeline"

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"
      - "frontend/**"
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - "frontend/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # CI — Secret Scan
  # ─────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog Secret Scanner
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --exclude-detectors sonarcloud

  # ─────────────────────────────────────────────────────────────────────────
  # CI — Lint, Test & Build
  # ─────────────────────────────────────────────────────────────────────────
  lint-test-build:
    name: Lint, Test & Build
    needs: secret-scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ BUG FIX #1 — was `actions/checkout@v7.0.0` (checkout action, not setup-node).
      # That meant Node.js was never actually installed; all subsequent `npm` steps
      # were running against whatever version was pre-installed on the runner,
      # and the cache/lockfile configuration was silently ignored.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ─── Backend ──────────────────────────────────────────────────────────
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint Backend
        working-directory: ./backend
        run: npm run lint --if-present

      - name: Test Backend
        working-directory: ./backend
        run: npm test --if-present

      - name: Build Backend
        working-directory: ./backend
        run: npm run build --if-present

      # ─── Frontend ─────────────────────────────────────────────────────────
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint --if-present

      - name: Test Frontend
        working-directory: ./frontend
        run: npm test --if-present

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build --if-present

  # ─────────────────────────────────────────────────────────────────────────
  # CI — SonarQube Static Analysis
  # ─────────────────────────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    needs: lint-test-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─────────────────────────────────────────────────────────────────────────
  # CD — Build & Push Docker Image
  # ─────────────────────────────────────────────────────────────────────────
  # build-and-package:
  #   name: Build & Push Docker Image
  #   runs-on: ubuntu-latest
  #   outputs:
  #     image_tag: ${{ steps.vars.outputs.tag }}

  #   steps:
  #     - name: Checkout Code
  #       uses: actions/checkout@v4

  #     - name: Set Version Tag
  #       id: vars
  #       run: echo "tag=v1.3-${{ github.run_number }}" >> $GITHUB_OUTPUT

  #     # BUG FIX #3 — was `docker/bake-action@v7.2.0`.
  #     # `bake-action` is NOT a Buildx setup step — it is a full image-build
  #     # action that reads your docker-bake.hcl and runs `docker buildx bake`
  #     # against the repository. That's why the logs showed it pulling your
  #     # git repo and trying to build both frontend AND backend from the bake
  #     # file — it was doing real builds when it was only supposed to be
  #     # setting up the Buildx builder for later steps to use.
  #     # The correct action for installing/configuring Buildx is setup-buildx-action.
  #     - name: Set up Docker Buildx
  #       uses: docker/setup-buildx-action@v3

  #     - name: Login to Container Registry
  #       uses: docker/login-action@v3
  #       with:
  #         registry: ${{ secrets.REGISTRY_URL }}
  #         username: ${{ secrets.REGISTRY_USER }}
  #         password: ${{ secrets.REGISTRY_PASSWORD }}

  #     # After the bake-action is replaced, this step now correctly controls
  #     # what gets built. Only the backend image is built and pushed here.
  #     # See also BUG FIX #4 below regarding the backend Dockerfile.
  #     - name: Build and Push Backend Image
  #       uses: docker/build-push-action@v6
  #       with:
  #         context: ./backend
  #         file: ./backend/Dockerfile
  #         push: true
  #         tags: ${{ secrets.REGISTRY_URL }}/app-backend:${{ steps.vars.outputs.tag }}

  build-and-package:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      # ---------- Checkout ------------
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: docker login -u mohammedbahr -p ${{ secrets.DOCKER_TOKEN }}

      # ---------- Backend ------------
      - name: build backend image
        run: docker build -t mohammedbahr/depi-project-backend:latest -f backend/dockerfile .

      - name: push backend image
        run: docker push mohammedbahr/depi-project-backend:latest

      # ---------- Frontend ------------
      - name: build frontend image
        run: docker build -t mohammedbahr/depi-project-frontend:latest -f frontend/dockerfile .

      - name: push frontend image
        run: docker push mohammedbahr/depi-project-frontend:latest

  # # ─────────────────────────────────────────────────────────────────────────
  # # CD — DAST & Functional Tests
  # # ─────────────────────────────────────────────────────────────────────────
  # dast-and-functional-test:
  #   name: DAST & Functional Tests
  #   needs: build-and-package
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: Checkout Code
  #       uses: actions/checkout@v4

  #     - name: Spin up Test Environment
  #       run: |
  #         docker run -d --name test_app -p 3000:3000 \
  #           ${{ secrets.REGISTRY_URL }}/app-backend:${{ needs.build-and-package.outputs.image_tag }}
  #         sleep 10

  #     - name: Run Selenium / Automation Tests
  #       run: |
  #         echo "Running Selenium testing suites..."

  #     - name: OWASP ZAP Baseline Scan
  #       uses: zaproxy/action-baseline@v0.12.0
  #       with:
  #         token: ${{ secrets.GITHUB_TOKEN }}
  #         target: "http://localhost:3000/API"
  #         rules_file_name: ".zap/rules.tsv"
  #         fail_action: true

  zap_scan:
    name: Scan the webapplication
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.13.0
        with:
          # token: ${{ secrets.GITHUB_TOKEN }}
          # docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          target: "https://localhost:5173/"

  # # ─────────────────────────────────────────────────────────────────────────
  # # CD — Deploy via GitOps (ArgoCD)
  # # ─────────────────────────────────────────────────────────────────────────
  # deploy-via-gitops:
  #   name: Deploy via GitOps (ArgoCD)
  #   needs: dast-and-functional-test
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: Checkout GitOps Repository
  #       uses: actions/checkout@v4
  #       with:
  #         repository: "your-org/gitops-helm-charts"
  #         token: ${{ secrets.GITOPS_REPO_PAT }}

  #     - name: Update Image Tag in Helm Values
  #       run: |
  #         sed -i 's/tag: .*/tag: "${{ needs.build-and-package.outputs.image_tag }}"/g' charts/app-backend/values.yaml
  #         git config --global user.name "gitops-bot"
  #         git config --global user.email "gitops@yourcompany.com"
  #         git commit -am "chore: deploy version ${{ needs.build-and-package.outputs.image_tag }} via ArgoCD"
  #         git push
